# Ktor backend configuration (HOCON).
# Secrets are loaded from environment variables; sensible defaults below
# match the local docker-compose Postgres setup.
ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
    }
    application {
        modules = [ "fun.nightshift.launcher.backend.ApplicationKt.main" ]
    }
}

database {
    # Driver: "h2" for development (zero-setup, in-memory) or "postgres" for prod.
    driver = "h2"
    driver = ${?DB_DRIVER}

    host = "localhost"
    host = ${?DB_HOST}
    port = 5432
    port = ${?DB_PORT}
    name = "nightshift"
    name = ${?DB_NAME}
    user = "nightshift"
    user = ${?DB_USER}
    password = "nightshift_dev"
    password = ${?DB_PASSWORD}
    poolSize = 10
}

security {
    # Opaque session token signing secret (used in later tasks)
    sessionSecret = "change-me-in-production"
    sessionSecret = ${?SESSION_SECRET}

    # Optional admin token for protected admin endpoints
    adminToken = ""
    adminToken = ${?ADMIN_TOKEN}
}

launcher {
    # Minimum supported launcher version for X-Client-Version middleware
    minClientVersion = "1.0.0"
    minClientVersion = ${?MIN_CLIENT_VERSION}

    # Currently published launcher build, served by GET /update/check.
    # Clients running below this version trigger a self-update.
    currentVersion = "1.0.0"
    currentVersion = ${?CURRENT_LAUNCHER_VERSION}

    # Direct download URL for the launcher .exe (matched by sha256 below).
    downloadUrl = "https://example.com/launcher.exe"
    downloadUrl = ${?LAUNCHER_DOWNLOAD_URL}

    # SHA-256 of the artifact at downloadUrl. Empty string disables the
    # client-side hash check (only sensible during development).
    downloadSha256 = ""
    downloadSha256 = ${?LAUNCHER_DOWNLOAD_SHA256}

    # Free-form release notes shown by the launcher's update screen.
    releaseNotes = ""
    releaseNotes = ${?LAUNCHER_RELEASE_NOTES}

    # Manifest served by GET /update/screenshots. Empty list -> client uses
    # bundled defaults. Override per-environment by appending entries:
    #
    # screenshots = [
    #   { name = "main",   url = "https://cdn.example.com/screens/1.png", sha256 = "abcd..." },
    #   { name = "second", url = "https://cdn.example.com/screens/2.png", sha256 = "ef01..." }
    # ]
    screenshots = []
}
