# Local PostgreSQL for NightShift Launcher development.
#
# Usage:
#   docker compose up -d        # start in background
#   docker compose down         # stop and remove containers
#   docker compose logs -f      # follow logs

services:
  postgres:
    image: postgres:16-alpine
    container_name: nightshift-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nightshift
      POSTGRES_USER: nightshift
      POSTGRES_PASSWORD: nightshift_dev
    volumes:
      - nightshift_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightshift -d nightshift"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nightshift_pg_data:
    name: nightshift_pg_data
